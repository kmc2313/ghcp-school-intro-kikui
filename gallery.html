<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>神山まるごと高専 | ギャラリー</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <div id="site-header"></div>
    <main class="section">
      <div class="container">
        <h1 class="section-title" data-i18n="gallery.title"></h1>
        <p data-i18n="gallery.lead"></p>
        <div class="cards">
          <figure class="card">
            <img src="assets/img/kamiyama-illust.svg" alt="神山風景のイラスト" />
            <figcaption data-i18n="gallery.item1"></figcaption>
          </figure>
          <figure class="card">
            <img src="assets/img/campus-illust.svg" alt="校舎と学寮のイラスト" />
            <figcaption data-i18n="gallery.item2"></figcaption>
          </figure>
          <figure class="card">
            <img src="assets/img/student-illust.svg" alt="学生イメージのイラスト" />
            <figcaption data-i18n="gallery.item3"></figcaption>
          </figure>
        </div>
        <p>
          <span class="badge-review" data-i18n="common.reviewBadge"></span>
          <span data-i18n="gallery.fiction"></span>
        </p>
      </div>
    </main>
    <div id="site-footer"></div>
    <script defer src="assets/js/layout.js"></script>
    <script defer src="assets/js/i18n.js"></script>
    <script defer src="assets/js/main.js"></script>
  </body>
  </html>
